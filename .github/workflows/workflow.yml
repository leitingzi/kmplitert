name: Publish

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  release:
    types:
      - released
      - prereleased

jobs:
  test-jvm-linux:
    name: Test JVM • Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run JVM Tests
        run: ./gradlew jvmTest --no-configuration-cache

  test-jvm-macos:
    name: Test JVM • macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run JVM Tests
        run: ./gradlew jvmTest --no-configuration-cache

  test-jvm-windows:
    name: Test JVM • Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Run JVM Tests
        shell: bash
        run: ./gradlew jvmTest --no-configuration-cache

  test-android:
    name: Test Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run Android Unit Tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

  test-ios-simulator:
    name: Test iOS Simulator
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run iOS Simulator Tests
        run: ./gradlew iosSimulatorArm64Test --no-configuration-cache

  test-native-linux:
    name: Test Native • Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run Linux Tests
        run: ./gradlew linuxX64Test --no-configuration-cache

  test-native-macos:
    name: Test Native • macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run macOS & iOS Simulator Tests
        run: ./gradlew macosArm64Test --no-configuration-cache

  test-native-windows:
    name: Test Native • Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Run Windows Tests
        shell: bash
        run: ./gradlew mingwX64Test --no-configuration-cache

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run JavaScript Tests
        run: ./gradlew jsBrowserTest --no-configuration-cache

  test-wasm:
    name: Test Wasm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Run Wasm Tests
        run: ./gradlew wasmJsBrowserTest --no-configuration-cache

  publish:
    name: Publish to Maven Central

    if: github.event_name == 'release'

    needs:
      - test-jvm-linux
      - test-jvm-macos
      - test-jvm-windows
      - test-android
      - test-ios-simulator
      - test-native-linux
      - test-native-macos
      - test-native-windows
      - test-js
      - test-wasm

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew

      - name: Publish
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}